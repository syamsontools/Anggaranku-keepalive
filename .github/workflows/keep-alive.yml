name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */5 * *'  # Setiap 5 hari sekali, jam 8 pagi UTC
  workflow_dispatch:        # Bisa dijalankan manual juga

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase AnggaranKu
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://itcfqblwgjvdfvftqjjt.supabase.co/rest/v1/anggarku_data?limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0Y2ZxYmx3Z2p2ZGZ2ZnRxamp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDM1NTksImV4cCI6MjA5NTAxOTU1OX0.Mevs5P67rliayyUIP5PncF7W3lD-Krg9DZZ1wnk6yaI")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Supabase aktif!"
          else
            echo "⚠️ Supabase response: $STATUS"
          fi
